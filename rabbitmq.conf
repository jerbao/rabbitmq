# ============================================================
# RabbitMQ broker configuration
# ============================================================
# This file is mounted into the container at:
#   /etc/rabbitmq/rabbitmq.conf
#
# It configures node discovery for the 3-node cluster.
# The IP addresses here MUST be reachable from each VM.

# Loopback users (default rabbit user is fine for local use)
loopback_users.guest = false

# Cluster formation using a static list of peer nodes.
# Each VM gets the same file — the nodes discover each other by IP.
cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config

cluster_formation.classic_config.nodes.1 = rabbit@rmq1
cluster_formation.classic_config.nodes.2 = rabbit@rmq2
cluster_formation.classic_config.nodes.3 = rabbit@rmq3

# Cluster node name (must match the docker-compose hostname)
cluster_formation.node_type = disc

# Heartbeat / failure detection
net_ticktime = 60

# Management plugin defaults (UI on port 15672)
management.tcp.port = 15672